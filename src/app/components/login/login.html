<div class="login-container">
  <div class="login-card">
    <h2>Iniciar Sesión</h2>
    
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      
      <div class="form-group">
        <label>Usuario</label>
        <input type="text" formControlName="username" placeholder="Ingresá tu usuario">
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" formControlName="password" placeholder="Ingresá tu contraseña">
      </div>

      <button type="submit" class="btn-login" [disabled]="loginForm.invalid">
        Ingresar
      </button>
    </form>

    <p *ngIf="errorMessage" class="error-msg">{{ errorMessage }}</p>

  </div>
</div>
